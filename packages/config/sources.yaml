sources:
  - id: mhlw-news
    name: 厚生労働省報道発表（月別一覧）
    type: html
    url: https://www.mhlw.go.jp/stf/houdou/houdou_list_{YYYYMM}.html
    weight: high
    alwaysAnalyze: false
    enabled: true

  - id: caa-press
    name: 消費者庁ウェブサイト
    type: html
    url: https://www.caa.go.jp/
    weight: high
    alwaysAnalyze: false
    enabled: true
    contentSelector: "#important, .important, .news-area, #news"

  - id: egov-pubcomment
    name: e-Govパブリックコメント
    type: html
    url: https://public-comment.e-gov.go.jp/
    weight: medium
    alwaysAnalyze: false
    enabled: true
    contentSelector: "main, #contents, .contents, body"

  - id: egov-law-api
    name: e-Gov法令API（更新法令一覧）
