sources:
  - id: mhlw-news
    name: 厚生労働省報道発表（月別一覧）
    type: html
    url: https://www.mhlw.go.jp/stf/houdou/houdou_list_{YYYYMM}.html
    weight: high
    alwaysAnalyze: false
    enabled: true

  - id: caa-press
    name: 消費者庁ウェブサイト
    type: html
    url: https://www.caa.go.jp/
    weight: high
    alwaysAnalyze: false
    enabled: true
    contentSelector: "#important, .important, .news-area, #news"

  - id: egov-pubcomment
    name: e-Govパブリックコメント
    type: html
    url: https://public-comment.e-gov.go.jp/
    weight: medium
    alwaysAnalyze: false
    enabled: true
    contentSelector: "main, #contents, .contents, body"

  - id: egov-law-api
    name: e-Gov法令API（更新法令一覧）
    type: api
    url: https://laws.e-gov.go.jp/api/1/updatelawlists/{YYYYMMDD}
    weight: medium
    alwaysAnalyze: false
    enabled: true
    stableIdField: LawId
    itemsPath: DataRoot.ApplData.LawNameListInfo

  - id: ncij-kokumin
    name: 国民生活センター
    type: html
    url: https://www.kokusen.go.jp/
    weight: medium
    alwaysAnalyze: false
    enabled: true
    contentSelector: "#contents, .contents, main"

  - id: mhlw-rss
    name: 厚労省RSS（要URL確認）
    type: rss
    url: https://www.mhlw.go.jp/rss/all.xml
    weight: high
    alwaysAnalyze: false
    enabled: false

  - id: kanpo-html
    name: 官報
    type: html
    url: https://kanpou.npb.go.jp/
    weight: medium
    alwaysAnalyze: false
    enabled: false

  - id: mhlw-jyosei
    name: 厚労省柔整療養費
    type: html
    url: https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/iryouhoken/jyuudou/index.html
    weight: high
    alwaysAnalyze: false
    enabled: true
    contentSelector: "main, #contents, .contents, body"

  - id: mhlw-ahaki-ryoyohi
    name: 厚労省あはき療養費（受領委任）
    type: html
    url: https://www.mhlw.go.jp/bunya/iryouhoken/jyuudou/oshirase.html
    weight: high
    alwaysAnalyze: false
    enabled: true
    contentSelector: "main, #contents, .contents, body"
    followPdfLinks: true
    pdfMaxLinks: 3
