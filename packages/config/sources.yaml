  - id: egov-law-api
    name: e-Gov法令API（更新法令一覧）
    type: api
    url: https://laws.e-gov.go.jp/api/1/updatelawlists/{YYYYMMDD}
    weight: medium
    alwaysAnalyze: false
    enabled: true
    stableIdField: LawId
    itemsPath: DataRoot.ApplData.LawNameListInfo
    # 「指導」「契約」等の汎用語が法令名に部分一致して無関係法令が
    # LLM 分析される洪水対策。業態直結語のみで判定する。
    keywordProfile: strict

